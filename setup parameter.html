<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <div class="window-header">QuizMaker <span>+ 👤</span></div>
    <div class="container" style="max-width: 500px;">
        <h2>Configure Your Quiz</h2>
        <div style="margin-bottom: 20px;">
            <label>Topic or Subject</label>
            <input type="text" placeholder="Enter topic...">
        </div>
        <div style="margin-bottom: 20px;">
            <label>Difficulty Level</label>
            <div class="toggle-group">
                <button>Easy</button>
                <button class="active">Medium</button>
                <button>Hard</button>
            </div>
        </div>
        <div style="margin-bottom: 30px;">
            <label>Question Types</label>
            <select>
                <option>Multiple Choice</option>
                <option>True / False</option>
            </select>
        </div>
        <button class="btn-primary" style="width: 100%; ">Generate Quiz</button>
    </div>
</body>
</html>
