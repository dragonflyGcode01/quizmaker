<body>

    <div class="container">
        <div class="window-header">QuizMaker <span>+ 👤</span></div>
        <h2>Configure Your Quiz</h2>

        <form id="quiz-form">
            <label for="itopic">Topic or Subject</label>
            <input type="text" id="itopic" name="topic" placeholder="e.g. Ancient Rome" required><br>

            <label for="ifile">Reference File (Optional)</label>
            <input type="file" id="ifile" name="file"><br>

            <label for="inumber">Number of Questions</label>
            <input type="number" id="inumber" name="number" min="5" max="50" value="10"><br>

            <label>Difficulty Level</label>
            <div class="toggle-group">
                <input type="radio" id="ieasy" name="difficulty" value="easy">
                <label for="ieasy">Easy</label>

                <input type="radio" id="imedium" name="difficulty" value="medium" checked>
                <label for="imedium">Medium</label>

                <input type="radio" id="ihard" name="difficulty" value="hard">
                <label for="ihard">Hard</label>
            </div>

            <label>Question Types</label>
            <div class="checkbox-group">
                <label class="checkbox-item"><input type="checkbox" name="types" value="Multiple Choice" checked> Multiple Choice</label>
                <label class="checkbox-item"><input type="checkbox" name="types" value="Identification"> Identification</label>
                <label class="checkbox-item"><input type="checkbox" name="types" value="True or False"> True/False</label>
                <label class="checkbox-item"><input type="checkbox" name="types" value="Enumeration"> Enumeration</label>
            </div>

            <button type="submit" class="btn-primary">Generate Quiz</button>
        </form>
    </div>

    <script type="module">
        // todo: disable generate button while loading prompt
        // todo: read/pass method based on file;
        import { GoogleGenerativeAI } from "https://esm.run/@google/generative-ai";

        const API_KEY = "AIzaSyAUodEfGCdgQiMlW4UXRVdp6kIZTFuK1RM";
        const genAI = new GoogleGenerativeAI(API_KEY);
        const quizForm = document.getElementById('quiz-form');

        async function runGemini(customPrompt) {
            try {
                const model = genAI.getGenerativeModel({ model: "gemini-flash-latest" });
                console.log("Waiting for response...");
                const result = await model.generateContent(customPrompt);
                console.log("Gemini Output:\n", result.response.text());
            } catch (error) {
                console.error("Error:", error);
            }
        }

        quizForm.addEventListener('submit', async (event) => {
            event.preventDefault();
            const formData = new FormData(quizForm);

            const data = {
                topic: formData.get('topic'),
                number: formData.get('number'),
                difficulty: formData.get('difficulty'),
                types: formData.getAll('types')
            };

            if (data.types.length === 0) {
                alert("Please select at least one question type!");
                return;
            }

            const prompt = `Generate a ${data.number}-question ${data.difficulty} quiz about ${data.topic}.
                            Include the following types: ${data.types.join(', ')}.`;

            console.log("Prompting:", prompt);
            // await runGemini(prompt);
        });
    </script>
</body>
