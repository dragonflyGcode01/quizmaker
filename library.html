<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <div class="window-header">QuizMaker <span>+ 👤</span></div>
    <div class="container">
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <h2>Your Library</h2>
            <span style="color: gray; font-size: 0.9rem;">Search for a quiz...</span>
        </div>
        <div style="display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; margin-top: 20px;">
            <!-- Quiz result Item -->
            <div style="border: 1px solid var(--border); border-radius: 12px; overflow: hidden;">
            <div style="height: 100px; background: #eee;"></div>
            <div style="padding: 15px; display: flex; justify-content: space-between; align-items: center;">
                <span style="font-weight: bold;">Biology</span>
                <button class="btn-primary btn-sm">Start</button>
            </div>
        </div>
        <!-- Repeat for more resul -->
    </div>
</div>
</body>
</html>
