<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
    a, a:link, a:visited, a:hover, a:active {
        text-decoration: none;
        color: black;
    }
    </style>
</head>
<body>
    <div class="window-header"><a href="./landing page.html">QuizMaker </a><span>+ 👤</span></div>
    <div id="quiz-library" class="container">
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <h2>Your Library</h2>
            <span style="color: gray; font-size: 0.9rem;">Search for a quiz...</span>
        </div>

        <div id="quiz-grid" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; margin-top: 20px;">
    </div>
        
        <!-- Repeat for more resul -->
    </div>
    <script type="module">
        import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';
        import { CONFIG } from './config.js';
        const supabase = createClient(CONFIG.SUPABASE_URL, CONFIG.SUPABASE_ANON_KEY);
        const quizManager = {
            async saveQuiz(quizEnvelope){
                sessionStorage.setItem('activeQuiz', JSON.stringify(quizEnvelope));
                const { error } = await supabase
                    .from('quizzes')
                    .insert({
                        id: quizEnvelope.id,
                        topic: quizEnvelope.topic,
                        difficulty: quizEnvelope.difficulty,
                        data: quizEnvelope,
                        created_at: new Date().toISOString()
                    });
                if (error) console.error('Error saving quiz:', error);
                this.renderList();
            },

            async sync(){
                const { data, error } = await supabase
                    .from('quizzes')
                    .select('*')
                    .order('created_at', { ascending: false });
                if (data) {
                    localStorage.setItem('cached_quizzes', JSON.stringify(data));
                    this.renderList(data);
                }
            },

            async deleteQuiz(id){
                if(!confirm('Are you sure you want to delete this quiz?')) return;

                await supabase
                    .from('quizzes')
                    .delete()
                    .eq('id', id);
                this.sync();
            },

            loadQuiz(id){
                const cached = JSON.parse(localStorage.getItem('cached_quizzes') || '[]');
                const quiz = cached.find(q => q.id === id);
                if(quiz) {
                    sessionStorage.setItem('activeQuiz', JSON.stringify(quiz.data));
                    window.location.href = './quiz.html';
                }
            },

            renderList(data = null) {
                const grid = document.getElementById('quiz-grid');
                const quizzes = data || JSON.parse(localStorage.getItem('cached_quizzes') || '[]');
                
                grid.innerHTML = quizzes.length ? '' : '<p style="grid-column: 1/-1; text-align: center;">No quizzes found.</p>';
                
                quizzes.forEach(q => {
                    const hue = q.topic.length * 42 % 360; 
                    const thumbColor = `hsl(${hue}, 60%, 80%)`;

                    const card = document.createElement('div');
                    card.style = "border: 1px solid #eee; border-radius: 12px; overflow: hidden; background: white; transition: transform 0.2s;";
                    
                    card.onmouseenter = () => card.style.transform = "translateY(-5px)";
                    card.onmouseleave = () => card.style.transform = "translateY(0)";

                    card.innerHTML = `
                        <div style="padding: 15px;">
                            <div style="display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px;">
                                <div>
                                    <h4 style="margin: 0; font-size: 1.1rem;">${q.topic}</h4>
                                    <small style="color: #666;">${q.difficulty}</small>
                                </div>
                                <button onclick="quizManager.deleteQuiz('${q.id}')" 
                                        style="background: none; border: none; cursor: pointer; color: #ccc; font-size: 1.2rem;">&times;</button>
                            </div>
                            <button onclick="quizManager.loadQuiz('${q.id}')" 
                                    class="btn-primary" 
                                    style="width: 100%; padding: 8px; border-radius: 6px; cursor: pointer;">
                                Start Quiz
                            </button>
                        </div>
                    `;
                    grid.appendChild(card);
                });
            },
        }
    quizManager.renderList();
    quizManager.sync();
    window.quizManager = quizManager;
    </script>
</body>
</html>
